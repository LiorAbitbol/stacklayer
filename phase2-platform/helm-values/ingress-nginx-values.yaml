# ingress-nginx Helm values — StackLayer Phase 2
# LoadBalancer service — MetalLB assigns 192.168.56.200

controller:
  replicaCount: 1
  service:
    type: LoadBalancer
    # Pin the IP so hosts-file entries never need to change
    loadBalancerIP: "192.168.56.200"
  # Allow scheduling on control-plane node if workers are unavailable
  tolerations:
    - key: node-role.kubernetes.io/control-plane
      operator: Exists
      effect: NoSchedule
